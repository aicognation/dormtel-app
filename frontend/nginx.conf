server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache the SPA shell — JS bundles are content-hashed and safe to cache
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 '{"status":"ok","service":"dormtel-frontend"}';
        add_header Content-Type application/json;
    }
}

version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dormtel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dormtel_dev}
      POSTGRES_DB: ${POSTGRES_DB:-dormtel}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dormtel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dormtel}:${POSTGRES_PASSWORD:-dormtel_dev}@db:5432/${POSTGRES_DB:-dormtel}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://localhost:3100
      STATEMENTS_DIR: /app/statements
    volumes:
      - ./backend/app:/app/app
      - statements_data:/app/statements
      - proofs_data:/app/proofs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

  tenant-portal:
    build: ./tenant-portal
    ports:
      - "3100:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  statements_data:
  proofs_data:

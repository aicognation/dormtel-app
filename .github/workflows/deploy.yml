name: Deploy DormTel to ECS

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy to Alibaba Cloud ECS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar czf dormtel-deploy.tar.gz \
            --exclude='node_modules' --exclude='build' --exclude='dist' \
            --exclude='__pycache__' --exclude='*.pyc' --exclude='.git' \
            --exclude='.env' --exclude='postgres_data' \
            backend frontend tenant-portal docker-compose.prod.yml

      - name: Transfer archive to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "dormtel-deploy.tar.gz"
          target: "/opt/dormtel/"

      - name: Extract and deploy on ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            cd /opt/dormtel
            echo "=== Extracting deployment archive ==="
            tar xzf dormtel-deploy.tar.gz
            rm -f dormtel-deploy.tar.gz
            echo "=== Building and starting services ==="
            docker compose -f docker-compose.prod.yml up -d --build api frontend tenant-portal
            echo "=== Waiting for services to start ==="
            sleep 15

      - name: Run database migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            cd /opt/dormtel
            echo "=== Running Alembic migrations ==="
            docker compose -f docker-compose.prod.yml exec api alembic upgrade head || true
            echo "=== Adding any missing columns ==="
            docker compose -f docker-compose.prod.yml exec -T db psql -U dormtel -d dormtel -c "
            ALTER TABLE inquiries ADD COLUMN IF NOT EXISTS inquiry_type VARCHAR(50);
            ALTER TABLE inquiries ADD COLUMN IF NOT EXISTS response TEXT;
            ALTER TABLE service_requests ADD COLUMN IF NOT EXISTS assigned_to UUID;
            ALTER TABLE demo.inquiries ADD COLUMN IF NOT EXISTS inquiry_type VARCHAR(50);
            ALTER TABLE demo.inquiries ADD COLUMN IF NOT EXISTS response TEXT;
            ALTER TABLE demo.service_requests ADD COLUMN IF NOT EXISTS assigned_to UUID;
            ALTER TABLE pilot.inquiries ADD COLUMN IF NOT EXISTS inquiry_type VARCHAR(50);
            ALTER TABLE pilot.inquiries ADD COLUMN IF NOT EXISTS response TEXT;
            ALTER TABLE pilot.service_requests ADD COLUMN IF NOT EXISTS assigned_to UUID;
            " || true
            echo "=== Ensuring inquiry_source enum has email ==="
            docker compose -f docker-compose.prod.yml exec -T db psql -U dormtel -d dormtel -c "ALTER TYPE inquiry_source ADD VALUE IF NOT EXISTS 'email';" || true
            echo "=== Applying QR campaigns migration ==="
            docker compose -f docker-compose.prod.yml exec -T db psql -U dormtel -d dormtel -c "
            CREATE TABLE IF NOT EXISTS demo.qr_campaigns (id UUID PRIMARY KEY, title VARCHAR(255) NOT NULL, property_code VARCHAR(10) NOT NULL DEFAULT 'DT01', start_date DATE, end_date DATE, notes TEXT, created_by UUID REFERENCES demo.staff(id), created_at TIMESTAMP NOT NULL DEFAULT NOW());
            CREATE TABLE IF NOT EXISTS pilot.qr_campaigns (id UUID PRIMARY KEY, title VARCHAR(255) NOT NULL, property_code VARCHAR(10) NOT NULL DEFAULT 'DT01', start_date DATE, end_date DATE, notes TEXT, created_by UUID REFERENCES pilot.staff(id), created_at TIMESTAMP NOT NULL DEFAULT NOW());
            ALTER TABLE demo.inquiries ADD COLUMN IF NOT EXISTS campaign_id UUID;
            ALTER TABLE demo.inquiries ADD COLUMN IF NOT EXISTS campaign_title VARCHAR(255);
            ALTER TABLE pilot.inquiries ADD COLUMN IF NOT EXISTS campaign_id UUID;
            ALTER TABLE pilot.inquiries ADD COLUMN IF NOT EXISTS campaign_title VARCHAR(255);
            " || true

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            echo "=== API Health ==="
            curl -sf http://localhost:8090/health || exit 1
            echo "=== Tenant Portal via Nginx ==="
            curl -sf -H 'Host: dormtel.bayanaihan.net' http://localhost/ || exit 1
            echo "=== Admin Portal via Nginx ==="
            curl -sf -H 'Host: dormtel-admin.bayanaihan.net' http://localhost/ || exit 1
            echo "=== Non-DormTel containers check ==="
            docker ps --format 'table {{.Names}}\t{{.Status}}' | grep -E 'crm-|jets-|aced-'
            echo "=== Deployment successful ==="

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/dormtel
            echo "=== Deployment failed - checking logs ==="
            docker compose -f docker-compose.prod.yml logs --tail=50 api
